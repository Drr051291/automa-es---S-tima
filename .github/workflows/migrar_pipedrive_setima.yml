name: Migrar Deals Pipedrive → Odoo (Sétima)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular sem criar (true = apenas mostra, false = cria de verdade)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      confirmar:
        description: "Confirmar leitura do Pipedrive (migração já concluída — só marque true para uma nova migração pontual)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  migrar:
    runs-on: ubuntu-latest
    environment: automações

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Migrar deals do Pipedrive
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
          PIPEDRIVE_PIPELINE_ID_SETIMA: "13"
          ODOO_TEAM_ID_SETIMA: "16"
          DRY_RUN: ${{ inputs.dry_run }}
          CONFIRMAR_LEITURA_PIPEDRIVE: ${{ inputs.confirmar }}
        run: python migrar_pipedrive_setima.py
