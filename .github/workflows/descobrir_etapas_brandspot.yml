name: Diagnostico Etapas BrandSpot (somente leitura)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pipedrive-odoo-sync-analysis-p7cbto
    paths:
      - descobrir_etapas_brandspot.py
      - .github/workflows/descobrir_etapas_brandspot.yml

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    environment: automações

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Diagnosticar etapas (somente leitura)
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
          PIPEDRIVE_PIPELINE_ID: "9"
        run: python descobrir_etapas_brandspot.py
