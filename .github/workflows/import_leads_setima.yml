name: Importar Leads Sétima (Meta Ads → Odoo)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    environment: automações

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Importar leads
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          ODOO_TEAM_ID_SETIMA: "16"
          ODOO_STAGE_ID_SETIMA: "68"
          SPREADSHEET_ID_SETIMA: "1tshAT18GUQMs54DIQS8yBF7rZUWzQW-h4wXYf2sxZRU"
        run: python import_leads_setima.py
