name: Limpar Leads Duplicados no Odoo

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular sem alterar (true = apenas mostra, false = aplica)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      hard_delete:
        description: "Apagar de vez? (false = arquivar/reversível, true = unlink/irreversível)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      team_id:
        description: "Equipe (17 = Campanhas BrandSpot, vazio = todas)"
        required: false
        default: "17"

jobs:
  limpar:
    runs-on: ubuntu-latest
    environment: automações

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Limpar duplicatas
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          HARD_DELETE: ${{ inputs.hard_delete }}
          ODOO_TEAM_ID: ${{ inputs.team_id }}
        run: python limpar_duplicatas.py
